# Docker Compose for Kick Bot

services:
  kick-bot:
    build: .
    container_name: kick-bot
    restart: unless-stopped
    volumes:
      # Mount proxies.txt from host to container
      - ./proxies.txt:/app/proxies.txt:ro
    env_file:
      # Load environment variables from .env file (create from .env.example)
      - .env
    environment:
      # Default values (can be overridden in .env file)
      - KICK_CHANNEL=${KICK_CHANNEL:-xqc}
      - KICK_VIEWERS=${KICK_VIEWERS:-500}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    # Note: No need for stdin_open/tty since this is now non-interactive
